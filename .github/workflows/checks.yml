name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile prod and tests
        run: python -m compileall -q PDF_handle/prod PDF_handle/tests
      - name: Import boundary check
        run: python PDF_handle/prod/check_import_boundaries.py
      - name: Unit, contract, and smoke tests
        run: python -m unittest discover -s PDF_handle/tests -v
      - name: Ignore rules guard
        run: git check-ignore .env data/raw/input.pdf data/generated/out.json outputs/result.json

  react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/work/react-v2-prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sites/work/react-v2-prototype/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Adapter boundary and unit tests
        run: npm test
